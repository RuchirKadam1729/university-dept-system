services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: university_dept
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d university_dept"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/university_dept
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://frontend:80
    depends_on:
      - frontend
    restart: unless-stopped

  test:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/university_dept_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c 'pip install -r requirements.txt && python -m pytest /app/tests/ -v'

volumes:
  postgres_data: