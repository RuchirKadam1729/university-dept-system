# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    asyncio: mark test as async
    slow: mark test as slow running
    integration: mark test as integration test

